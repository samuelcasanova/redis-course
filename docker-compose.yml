services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    # The official redis image accepts command line arguments to configure redis-server
    # --appendonly yes: Enables AOF persistence
    # --save "60 1": Enables RDB snapshotting (save dataset every 60 seconds if at least 1 key changed)
    command: redis-server --appendonly yes --save "60 1"
    volumes:
      - ./.data/redis:/data

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

  backend:
    image: python:3.11-alpine
    container_name: engagement-backend
    working_dir: /app
    volumes:
      - ./engagement-backend:/app
      - ./.data/sqlite:/data/sqlite
    ports:
      - "8000:8000"
    command: sh -c "pip install redis fastapi uvicorn pydantic && uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - redis

  frontend:
    image: node:20-alpine
    container_name: engagement-app
    working_dir: /app
    volumes:
      - ./engagement-app:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
